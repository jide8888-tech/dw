<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- CSP 메타 태그: 인라인 스크립트/외부 리소스 제한 -->
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self';
               script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net;
               style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
               font-src https://fonts.gstatic.com;
               img-src 'self' data:;
               connect-src 'self';">
  <title>KPI 대시보드</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
  <!-- DOMPurify: XSS 방어용 라이브러리 -->
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.6/dist/purify.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
    }
    .header {
      background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
      padding: 20px 32px;
      border-bottom: 1px solid #334155;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .header h1 { font-size: 22px; font-weight: 700; color: #f8fafc; }
    .header .security-badge {
      background: #065f46;
      color: #6ee7b7;
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 500;
    }
    .dashboard { padding: 24px 32px; }
    .kpi-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 20px;
      margin-bottom: 32px;
    }
    .kpi-card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 24px;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .kpi-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.3);
    }
    .kpi-label { font-size: 13px; color: #94a3b8; margin-bottom: 8px; }
    .kpi-value { font-size: 32px; font-weight: 700; }
    .kpi-change {
      font-size: 13px; margin-top: 8px;
      display: flex; align-items: center; gap: 4px;
    }
    .kpi-change.up { color: #4ade80; }
    .kpi-change.down { color: #f87171; }
    .chart-section {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 20px;
      margin-bottom: 32px;
    }
    .chart-box {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 24px;
    }
    .chart-box h3 {
      font-size: 16px; font-weight: 600;
      margin-bottom: 16px; color: #f1f5f9;
    }
    .bar-chart { display: flex; flex-direction: column; gap: 12px; }
    .bar-row {
      display: flex; align-items: center; gap: 12px;
    }
    .bar-label { width: 80px; font-size: 13px; color: #94a3b8; text-align: right; }
    .bar-track {
      flex: 1; height: 28px;
      background: #0f172a;
      border-radius: 6px;
      overflow: hidden;
    }
    .bar-fill {
      height: 100%;
      border-radius: 6px;
      display: flex;
      align-items: center;
      padding-left: 10px;
      font-size: 12px;
      font-weight: 600;
      color: #fff;
      transition: width 0.8s ease;
    }
    .donut-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .donut-svg { width: 180px; height: 180px; }
    .donut-legend {
      margin-top: 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .legend-item {
      display: flex; align-items: center; gap: 8px; font-size: 13px;
    }
    .legend-dot {
      width: 10px; height: 10px; border-radius: 50%;
    }
    .table-section {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 24px;
    }
    .table-section h3 {
      font-size: 16px; font-weight: 600;
      margin-bottom: 16px; color: #f1f5f9;
    }
    table { width: 100%; border-collapse: collapse; }
    th {
      text-align: left;
      padding: 10px 12px;
      font-size: 12px;
      color: #64748b;
      border-bottom: 1px solid #334155;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    td {
      padding: 12px;
      font-size: 14px;
      border-bottom: 1px solid #1e293b;
    }
    tr:hover td { background: #263044; }
    .status {
      padding: 4px 10px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 500;
    }
    .status.good { background: #064e3b; color: #6ee7b7; }
    .status.warn { background: #78350f; color: #fbbf24; }
    .status.bad  { background: #7f1d1d; color: #fca5a5; }
    .security-log {
      margin-top: 32px;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 24px;
    }
    .security-log h3 {
      font-size: 16px; font-weight: 600;
      margin-bottom: 16px; color: #f1f5f9;
    }
    .log-entry {
      display: flex; justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid #0f172a;
      font-size: 13px;
    }
    .log-entry .log-type { color: #38bdf8; font-weight: 500; }
    .log-entry .log-time { color: #64748b; }
    .csrf-info {
      margin-top: 24px;
      padding: 16px;
      background: #172554;
      border: 1px solid #1e40af;
      border-radius: 8px;
      font-size: 13px;
      color: #93c5fd;
    }
    @media (max-width: 768px) {
      .chart-section { grid-template-columns: 1fr; }
      .kpi-grid { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>

  <!-- 헤더 -->
  <div class="header">
    <h1>📊 KPI 대시보드</h1>
    <span class="security-badge">🔒 보안 활성화 (XSS/CSRF 방어)</span>
  </div>

  <div class="dashboard">
    <!-- KPI 카드 -->
    <div class="kpi-grid" id="kpiGrid"></div>

    <!-- 차트 섹션 -->
    <div class="chart-section">
      <div class="chart-box">
        <h3>월별 매출 추이</h3>
        <div class="bar-chart" id="barChart"></div>
      </div>
      <div class="chart-box">
        <h3>카테고리별 비율</h3>
        <div class="donut-container" id="donutChart"></div>
      </div>
    </div>

    <!-- 테이블 -->
    <div class="table-section">
      <h3>최근 KPI 상세</h3>
      <table id="kpiTable">
        <thead>
          <tr>
            <th>지표</th>
            <th>현재값</th>
            <th>목표</th>
            <th>달성률</th>
            <th>상태</th>
          </tr>
        </thead>
        <tbody id="kpiTableBody"></tbody>
      </table>
    </div>

    <!-- 보안 로그 -->
    <div class="security-log">
      <h3>🛡️ 보안 이벤트 로그</h3>
      <div id="securityLog"></div>
    </div>

    <!-- CSRF 토큰 정보 -->
    <div class="csrf-info">
      <strong>CSRF 토큰:</strong>
      <span id="csrfDisplay"></span>
      <br><small>모든 데이터 요청 시 이 토큰이 자동으로 헤더에 포함됩니다.</small>
    </div>
  </div>

  <script>
    // =============================================
    // 1. 보안 유틸리티
    // =============================================

    const Security = {
      // CSRF 토큰 생성
      csrfToken: '',
      generateCSRFToken() {
        const array = new Uint8Array(32);
        crypto.getRandomValues(array);
        this.csrfToken = Array.from(array, b => b.toString(16).padStart(2, '0')).join('');
        return this.csrfToken;
      },

      // XSS 방어: HTML 이스케이프
      escapeHTML(str) {
        if (typeof str !== 'string') return String(str);
        const div = document.createElement('div');
        div.appendChild(document.createTextNode(str));
        return div.innerHTML;
      },

      // DOMPurify를 통한 HTML 정화
      sanitize(dirty) {
        if (typeof DOMPurify !== 'undefined') {
          return DOMPurify.sanitize(dirty, {
            ALLOWED_TAGS: ['b', 'i', 'em', 'strong', 'span'],
            ALLOWED_ATTR: ['class']
          });
        }
        return this.escapeHTML(dirty);
      },

      // 입력값 검증
      validateNumber(value, min = 0, max = Number.MAX_SAFE_INTEGER) {
        const num = Number(value);
        if (isNaN(num) || num < min || num > max) {
          this.logEvent('VALIDATION', `잘못된 숫자 입력 차단: ${this.escapeHTML(String(value))}`);
          return null;
        }
        return num;
      },

      validateString(value, maxLength = 200) {
        if (typeof value !== 'string') return '';
        if (value.length > maxLength) {
          this.logEvent('VALIDATION', `문자열 길이 초과 차단 (${value.length}자)`);
          return value.substring(0, maxLength);
        }
        return value;
      },

      // 보안 fetch 래퍼 (CSRF 토큰 자동 첨부)
      async secureFetch(url, options = {}) {
        const headers = {
          ...options.headers,
          'X-CSRF-Token': this.csrfToken,
          'Content-Type': 'application/json',
        };
        this.logEvent('REQUEST', `보안 요청: ${this.escapeHTML(url)}`);
        return fetch(url, { ...options, headers, credentials: 'same-origin' });
      },

      // 보안 이벤트 로그
      events: [],
      logEvent(type, message) {
        const entry = {
          type: this.validateString(type, 50),
          message: this.validateString(message, 500),
          time: new Date().toLocaleTimeString('ko-KR')
        };
        this.events.unshift(entry);
        if (this.events.length > 50) this.events.pop();
      }
    };

    // 초기 CSRF 토큰 생성
    Security.generateCSRFToken();
    Security.logEvent('INIT', 'CSRF 토큰 생성 완료');
    Security.logEvent('INIT', 'DOMPurify XSS 방어 활성화');
    Security.logEvent('INIT', 'CSP 정책 적용됨');

    // =============================================
    // 2. 데이터 (샘플 — 실제 API 연동 시 secureFetch 사용)
    // =============================================

    const kpiData = [
      { label: '총 매출', value: '₩12.4억', change: '+12.5%', direction: 'up', color: '#3b82f6' },
      { label: '신규 고객', value: '1,284', change: '+8.2%', direction: 'up', color: '#8b5cf6' },
      { label: '전환율', value: '3.42%', change: '-0.3%', direction: 'down', color: '#f59e0b' },
      { label: '고객 만족도', value: '94.7%', change: '+2.1%', direction: 'up', color: '#10b981' },
    ];

    const monthlyData = [
      { month: '1월', value: 68 }, { month: '2월', value: 72 },
      { month: '3월', value: 85 }, { month: '4월', value: 78 },
      { month: '5월', value: 92 }, { month: '6월', value: 88 },
    ];

    const categoryData = [
      { name: '제품 A', value: 40, color: '#3b82f6' },
      { name: '제품 B', value: 25, color: '#8b5cf6' },
      { name: '제품 C', value: 20, color: '#10b981' },
      { name: '기타',   value: 15, color: '#64748b' },
    ];

    const tableData = [
      { name: '월 매출 목표', current: '₩12.4억', target: '₩15억', rate: 82.7, status: 'warn' },
      { name: '고객 유지율', current: '91.2%', target: '90%', rate: 101.3, status: 'good' },
      { name: '응답 시간',   current: '1.8초', target: '1.5초', rate: 83.3, status: 'warn' },
      { name: '오류율',      current: '0.12%', target: '0.5%', rate: 100, status: 'good' },
      { name: 'NPS 점수',    current: '72', target: '80', rate: 90.0, status: 'warn' },
    ];

    // =============================================
    // 3. 렌더링 (안전한 DOM 조작)
    // =============================================

    function renderKPIs() {
      const grid = document.getElementById('kpiGrid');
      grid.innerHTML = '';
      kpiData.forEach(kpi => {
        const card = document.createElement('div');
        card.className = 'kpi-card';
        card.style.borderTop = `3px solid ${Security.escapeHTML(kpi.color)}`;
        card.innerHTML = `
          <div class="kpi-label">${Security.escapeHTML(kpi.label)}</div>
          <div class="kpi-value" style="color:${Security.escapeHTML(kpi.color)}">
            ${Security.escapeHTML(kpi.value)}
          </div>
          <div class="kpi-change ${kpi.direction === 'up' ? 'up' : 'down'}">
            ${kpi.direction === 'up' ? '▲' : '▼'} ${Security.escapeHTML(kpi.change)} vs 전월
          </div>`;
        grid.appendChild(card);
      });
    }

    function renderBarChart() {
      const chart = document.getElementById('barChart');
      chart.innerHTML = '';
      const maxVal = Math.max(...monthlyData.map(d => d.value));
      monthlyData.forEach(d => {
        const pct = (d.value / maxVal * 100).toFixed(1);
        const row = document.createElement('div');
        row.className = 'bar-row';
        row.innerHTML = `
          <span class="bar-label">${Security.escapeHTML(d.month)}</span>
          <div class="bar-track">
            <div class="bar-fill" style="width:${pct}%;background:linear-gradient(90deg,#3b82f6,#8b5cf6)">
              ${Security.escapeHTML(String(d.value))}%
            </div>
          </div>`;
        chart.appendChild(row);
      });
    }

    function renderDonut() {
      const container = document.getElementById('donutChart');
      let cumulativePercent = 0;
      const radius = 60, cx = 90, cy = 90;
      let paths = '';
      categoryData.forEach(seg => {
        const startAngle = cumulativePercent * 3.6;
        cumulativePercent += seg.value;
        const endAngle = cumulativePercent * 3.6;
        const start = polarToCartesian(cx, cy, radius, endAngle);
        const end = polarToCartesian(cx, cy, radius, startAngle);
        const largeArc = seg.value > 50 ? 1 : 0;
        paths += `<path d="M ${cx} ${cy} L ${start.x} ${start.y} A ${radius} ${radius} 0 ${largeArc} 0 ${end.x} ${end.y} Z" fill="${Security.escapeHTML(seg.color)}"/>`;
      });
      paths += `<circle cx="${cx}" cy="${cy}" r="35" fill="#1e293b"/>`;

      let legendHTML = '<div class="donut-legend">';
      categoryData.forEach(seg => {
        legendHTML += `<div class="legend-item">
          <span class="legend-dot" style="background:${Security.escapeHTML(seg.color)}"></span>
          ${Security.escapeHTML(seg.name)} (${Security.escapeHTML(String(seg.value))}%)
        </div>`;
      });
      legendHTML += '</div>';

      container.innerHTML = `<svg class="donut-svg" viewBox="0 0 180 180">${paths}</svg>${legendHTML}`;
    }

    function polarToCartesian(cx, cy, r, angleDeg) {
      const rad = (angleDeg - 90) * Math.PI / 180;
      return { x: cx + r * Math.cos(rad), y: cy + r * Math.sin(rad) };
    }

    function renderTable() {
      const tbody = document.getElementById('kpiTableBody');
      tbody.innerHTML = '';
      tableData.forEach(row => {
        const statusLabel = { good: '양호', warn: '주의', bad: '위험' };
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${Security.escapeHTML(row.name)}</td>
          <td>${Security.escapeHTML(row.current)}</td>
          <td>${Security.escapeHTML(row.target)}</td>
          <td>${Security.escapeHTML(String(row.rate))}%</td>
          <td><span class="status ${row.status}">${Security.escapeHTML(statusLabel[row.status])}</span></td>`;
        tbody.appendChild(tr);
      });
    }

    function renderSecurityLog() {
      const logDiv = document.getElementById('securityLog');
      logDiv.innerHTML = '';
      Security.events.forEach(evt => {
        const entry = document.createElement('div');
        entry.className = 'log-entry';
        entry.innerHTML = `
          <span><span class="log-type">[${Security.escapeHTML(evt.type)}]</span> ${Security.escapeHTML(evt.message)}</span>
          <span class="log-time">${Security.escapeHTML(evt.time)}</span>`;
        logDiv.appendChild(entry);
      });
    }

    function renderCSRFInfo() {
      document.getElementById('csrfDisplay').textContent =
        Security.csrfToken.substring(0, 16) + '••••••••';
    }

    // =============================================
    // 4. 초기화
    // =============================================

    renderKPIs();
    renderBarChart();
    renderDonut();
    renderTable();
    renderSecurityLog();
    renderCSRFInfo();
  </script>
</body>
</html>
